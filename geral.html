<style>
  /* Modal fullscreen */
  .modal {
    display: block; /* já aberto */
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    overflow: hidden; /* evita rolagem na página de fundo */
  }

  .modal-content {
    width: 100%;
    height: 100%;
    background: #fff;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 20px;
  }

  .modal-header {
    display: flex;
    justify-content: center; /* centraliza o título */
    align-items: center;
    flex-shrink: 0;
    position: relative;
  }

  .modal-header h3 {
    margin: 0;
    font-size: 1.8rem;
    color: #003366;
    text-align: center;
  }

  .modal-header .btn-container {
    position: absolute;
    right: 0;
    display: flex;
    gap: 10px;
  }

  .btn-imprimir {
    padding: 6px 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  .btn-imprimir:hover {
    background: #0056b3;
  }

  .table-container {
    flex-grow: 1;
    overflow: auto; /* scroll só dentro da tabela */
    margin-top: 15px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
    overflow-wrap: break-word;
    white-space: normal;
  }

  thead {
    background: #003366;
    color: white;
  }

  th.pos { width: 6%; }
  th.competidor { width: 40%; }
  th.cidade { width: 28%; }
  th.etapas { width: 10%; }
  th.total { width: 16%; }

  /* Destaque por posição com cores suaves */
  .pos1-3 { background-color: #FFF5B1; } /* dourado suave */
  .pos4-10 { background-color: #D8E4F0; } /* azul claro */
  .pos11-20 { background-color: #F9E0D9; } /* laranja suave */
</style>
